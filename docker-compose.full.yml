# CareLoom Full Stack (DB + API + Admin Web)
# Usage: docker compose -f docker-compose.full.yml up --build
# Copy .env.example to .env and edit before running.
#
# Note: The mobile app (services/app) is NOT containerized.
# Run it separately with: cd services/app && npx expo start

services:
  db:
    image: mysql:5.7
    container_name: careloom-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-careloom}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-careloom}
      MYSQL_USER: ${MYSQL_USER:-careloom}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-careloom}
    ports:
      - "3306:3306"
    volumes:
      - careloom_dbdata:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-careloom}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: services/api
      dockerfile: Dockerfile
    container_name: careloom-api
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/${MYSQL_DATABASE:-careloom}?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=utf-8
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-careloom}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-careloom}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev-secret-do-not-use-in-prod}
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  admin-web:
    build:
      context: services/admin-web
      dockerfile: Dockerfile
    container_name: careloom-admin
    restart: always
    depends_on:
      api:
        condition: service_healthy
    environment:
      API_URL: http://api:8080
    ports:
      - "3000:3000"

volumes:
  careloom_dbdata:
